app = 'syndex'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  INITIAL_CAPITAL = '1000'
  LOG_LEVEL = 'info'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
